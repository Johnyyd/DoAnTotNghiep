name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: ${{ secrets.SA_PASSWORD }}
          ACCEPT_EULA: Y
        ports: ["1433:1433"]
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P $SA_PASSWORD -Q \"SELECT 1\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      # ---------- Backend ----------
      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore backend deps
        working-directory: GMP_System/GMP_System
        run: dotnet restore

      - name: Run backend unit tests
        working-directory: GMP_System/GMP_System.Tests
        run: dotnet test --no-build --verbosity normal

      - name: Build backend image
        working-directory: GMP_System/GMP_System
        run: |
          docker build -t ghcr.io/${{ github.repository }}/gmp-api:latest .

      # ---------- Frontend ----------
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install & test frontend
        working-directory: PharmaceuticalProcessingManagementSystem/PharmaceuticalProcessingManagementSystem
        run: |
          npm ci
          npm run test --if-present

      - name: Build frontend image
        working-directory: PharmaceuticalProcessingManagementSystem/PharmaceuticalProcessingManagementSystem
        run: |
          docker build -t ghcr.io/${{ github.repository }}/gmp-frontend:latest .

      # ---------- Mobile ----------
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Run Flutter tests
        working-directory: MobileApp
        run: flutter test

      - name: Build mobile image
        working-directory: MobileApp
        run: |
          docker build -t ghcr.io/${{ github.repository }}/gmp-mobile:latest .

      # ---------- Push images ----------
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push images
        run: |
          docker push ghcr.io/${{ github.repository }}/gmp-api:latest
          docker push ghcr.io/${{ github.repository }}/gmp-frontend:latest
          docker push ghcr.io/${{ github.repository }}/gmp-mobile:latest
