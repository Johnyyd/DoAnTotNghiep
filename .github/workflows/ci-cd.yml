name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./GMP_System/GMP_System
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: "Your_password123"
          ACCEPT_EULA: "Y"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "exit 0" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release
      - name: Run unit tests
        run: dotnet test --no-build --verbosity normal

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./PharmaceuticalProcessingManagementSystem/PharmaceuticalProcessingManagementSystem
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run Jest tests
        run: npm test
      - name: Build frontend
        run: npm run build

  build-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./MobileApp
    steps:
      - uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Run Flutter tests
        run: flutter test
      - name: Build Android APK
        run: flutter build apk --release
      - name: Build iOS (placeholder)
        run: echo "iOS build requires macOS runners"

  docker-build:
    needs: [build-backend, build-frontend, build-mobile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API Docker image
        run: |
          cd GMP_System/GMP_System
          docker build -t ghcr.io/${{ github.repository_owner }}/gmp-api:latest .
      - name: Build Frontend Docker image
        run: |
          cd PharmaceuticalProcessingManagementSystem/PharmaceuticalProcessingManagementSystem
          docker build -t ghcr.io/${{ github.repository_owner }}/gmp-frontend:latest .
      - name: Build Mobile Docker image
        run: |
          cd MobileApp
          docker build -t ghcr.io/${{ github.repository_owner }}/gmp-mobile:latest .
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push images
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/gmp-api:latest
          docker push ghcr.io/${{ github.repository_owner }}/gmp-frontend:latest
          docker push ghcr.io/${{ github.repository_owner }}/gmp-mobile:latest
