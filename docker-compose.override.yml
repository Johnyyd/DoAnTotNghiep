
services:
  # ---------------------------------------------------------------
  # 1. DATABASE: SQL Server
  # ---------------------------------------------------------------
  gmp-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gmp-sqlserver
    networks:
      - gmp-network
    ports:
      - "1435:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    volumes:
      - ./DATABASE:/var/opt/mssql/backup:ro
      - gmp-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${SA_PASSWORD}", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ---------------------------------------------------------------
  # 2. BACKEND (.NET Core API)
  # ---------------------------------------------------------------
  gmp-api:
    build:
      context: ./GMP_System/GMP_System
      dockerfile: Dockerfile
      target: build
    container_name: gmp-api
    networks:
      - gmp-network
    ports:
      - "5001:5000"
    env_file: .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=1
      - ConnectionStrings__DefaultConnection=Server=gmp-sqlserver;Database=PharmaceuticalProcessingManagementSystem;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true
      - Jwt__Key=GMP_WHO_Default_Secret_Key_Minimum_32_Characters_Long_123456789
    depends_on:
      gmp-sqlserver:
        condition: service_healthy
    volumes:
      - ./DATABASE:/app/DATABASE:ro
      - ./GMP_System/GMP_System:/src
    command: dotnet watch run --project GMP_System.csproj --urls "http://0.0.0.0:5000" --no-hot-reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------
  # 3. FRONTEND (React + TypeScript)
  # ---------------------------------------------------------------
  gmp-frontend:
    build:
      context: ./PharmaceuticalProcessingManagementSystem/PharmaceuticalProcessingManagementSystem
      dockerfile: Dockerfile
      target: build
      args:
        - VITE_API_URL=/api
    container_name: gmp-frontend
    networks:
      - gmp-network
    ports:
      - "8080:80"
    environment:
      - VITE_API_URL=/api
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./PharmaceuticalProcessingManagementSystem/PharmaceuticalProcessingManagementSystem:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 80
    depends_on:
      - gmp-api
    restart: unless-stopped

  # ---------------------------------------------------------------
  # 4. MOBILE APP (Flutter Web)
  # ---------------------------------------------------------------
  gmp-mobile:
    build:
      context: ./MobileApp
      dockerfile: Dockerfile
    container_name: gmp-mobile
    networks:
      - gmp-network
    ports:
      - "8081:80"
    depends_on:
      - gmp-api
    restart: unless-stopped

networks:
  gmp-network:
    name: gmp-network

volumes:
  gmp-sqlserver-data:
