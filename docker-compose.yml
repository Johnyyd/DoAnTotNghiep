
services:
  gmp-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gmp-sqlserver
    environment:
      - SA_PASSWORD=${SA_PASSWORD}
      - ACCEPT_EULA=Y
    ports:
      - "1435:1433"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "SA", "-P", "${SA_PASSWORD}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gmp-api:
    build:
      context: ./GMP_System/GMP_System
      dockerfile: Dockerfile
    container_name: gmp-api
    env_file: .env
    depends_on:
      gmp-sqlserver:
        condition: service_healthy
    ports:
      - "5001:5000"
    volumes:
      - ./DATABASE/materials:/app/materials
      - ./DATABASE/finished_goods:/app/finished_goods
      - ./DATABASE/batches:/app/batches
    restart: unless-stopped
    # entrypoint will be set inside Dockerfile to run migrations then start the app

  gmp-frontend:
    build:
      context: ./PharmaceuticalProcessingManagementSystem/PharmaceuticalProcessingManagementSystem
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://gmp-api:80
    container_name: gmp-frontend
    ports:
      - "8080:80"
    depends_on:
      - gmp-api
    restart: unless-stopped

  gmp-mobile:
    build:
      context: ./MobileApp
      dockerfile: Dockerfile
    container_name: gmp-mobile
    ports:
      - "8081:80"
    depends_on:
      - gmp-api
    restart: unless-stopped

networks:
  default:
    name: gmp-network
